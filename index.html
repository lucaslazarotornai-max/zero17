
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--r:#e30613;--y:#fbba00;--bl:#111111;--wh:#fff;--gray1:#f7f6f3;--gray2:#eeede9;--gray3:#888}
body{font-family:system-ui,sans-serif;background:transparent;color:var(--color-text-primary)}

.nav{display:flex;background:var(--bl);overflow-x:auto;scrollbar-width:none;border-bottom:3px solid var(--r)}
.nav::-webkit-scrollbar{display:none}
.ntab{flex-shrink:0;padding:.55rem .9rem;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .15s;white-space:nowrap}
.ntab.on{color:var(--y);border-bottom-color:var(--y)}
.ntab:hover:not(.on){color:#fff}

.pg{display:none;padding:1rem}
.pg.on{display:block}

.sec-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray3);margin-bottom:.5rem}

/* CRONOGRAMA */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-dh{font-size:10px;font-weight:700;text-align:center;color:var(--gray3);padding:.2rem 0;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{min-height:54px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);padding:4px 5px;cursor:pointer;transition:border-color .15s;position:relative}
.cal-day:hover{border-color:var(--r)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day.today{border:1.5px solid var(--r)}
.cal-day.checked{background:#e30613;border-color:#e30613}
.cal-day.checked .cal-dn{color:#fff}
.cal-day.checked .cal-tags{opacity:.8}
.cal-day.checked::after{content:"✓";position:absolute;top:3px;right:5px;font-size:11px;font-weight:700;color:#fff}
.cal-day.event-day{border-left:2.5px solid var(--y)}
.cal-dn{font-size:11px;font-weight:700;color:var(--color-text-primary);margin-bottom:2px}
.cal-tags{display:flex;flex-wrap:wrap;gap:2px}
.ct{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;white-space:nowrap}
.ct-r{background:#e30613;color:#fff}
.ct-y{background:#fbba00;color:#111}
.ct-b{background:#1a1a1a;color:#fbba00}
.ct-g{background:#22c55e;color:#fff}
.ct-p{background:#7c3aed;color:#fff}

.day-detail{margin-top:1rem;border-radius:10px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden;display:none}
.day-detail.on{display:block}
.dd-head{background:var(--bl);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between}
.dd-title{font-size:14px;font-weight:700;color:#fff}
.dd-phase{font-size:10px;font-weight:700;background:var(--r);color:#fff;padding:2px 8px;border-radius:10px;letter-spacing:.05em}
.dd-body{padding:.8rem 1rem}
.task-list{display:flex;flex-direction:column;gap:.4rem}
.task{display:flex;align-items:flex-start;gap:.5rem;padding:.4rem .5rem;border-radius:6px;cursor:pointer;transition:background .1s}
.task:hover{background:var(--gray1)}
.task.done{opacity:.55}
.task.done .task-text{text-decoration:line-through}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .15s;background:var(--color-background-primary)}
.chk.on{background:var(--r);border-color:var(--r);color:#fff}
.task-text{font-size:12px;line-height:1.4;color:var(--color-text-primary)}
.task-type{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:auto;flex-shrink:0;align-self:center}

.prog-bar{margin-top:.8rem;display:flex;align-items:center;gap:.6rem}
.prog-track{flex:1;height:6px;background:var(--gray2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--r);border-radius:3px;transition:width .3s}
.prog-text{font-size:11px;font-weight:700;color:var(--r);min-width:28px;text-align:right}

/* PRODUTOS */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.prod-card{border-radius:10px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden;cursor:pointer;transition:border-color .15s}
.prod-card:hover{border-color:var(--r)}
.prod-card.open{border-color:var(--r);border-width:1.5px}
.prod-top{background:var(--bl);padding:.6rem .8rem;display:flex;align-items:center;gap:.5rem}
.prod-num{font-size:18px;font-weight:700;color:var(--y);min-width:22px;line-height:1;font-family:Georgia,serif}
.prod-name{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.prod-tag{font-size:9px;font-weight:700;background:var(--r);color:#fff;padding:1px 6px;border-radius:8px;margin-left:auto;white-space:nowrap}
.prod-body{padding:.7rem .8rem;display:none}
.prod-card.open .prod-body{display:block}
.prod-desc{font-size:11px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:.6rem}
.copy-block{background:var(--gray1);border-radius:6px;padding:.5rem .6rem;margin-bottom:.4rem;border-left:2px solid var(--r)}
.copy-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--r);margin-bottom:.2rem}
.copy-text{font-size:11px;line-height:1.5;color:var(--color-text-primary)}
.copy-cta{font-size:10px;font-weight:700;color:var(--gray3);margin-top:.2rem}
.content-pills{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.5rem}
.cpill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}

/* COPIES GERAIS */
.copy-section{margin-bottom:1rem}
.copy-section-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:.4rem;padding-bottom:.3rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.big-copy{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:.7rem .8rem;margin-bottom:.35rem;cursor:pointer;transition:border-color .15s}
.big-copy:hover{border-color:var(--r)}
.bc-meta{display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem}
.bc-phase{font-size:9px;font-weight:700;letter-spacing:.05em;background:var(--bl);color:var(--y);padding:2px 7px;border-radius:8px}
.bc-format{font-size:9px;color:var(--gray3);font-weight:600}
.bc-head{font-size:13px;font-weight:700;color:var(--color-text-primary);margin-bottom:.2rem;line-height:1.3}
.bc-body{font-size:11px;color:var(--color-text-secondary);line-height:1.5}
.bc-cta{font-size:10px;font-weight:700;color:var(--r);margin-top:.2rem}

/* ADS */
.ads-step{border-radius:10px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);margin-bottom:.6rem;overflow:hidden}
.ads-step-head{display:flex;align-items:center;gap:.6rem;padding:.65rem .9rem;cursor:pointer}
.ads-step-num{width:26px;height:26px;border-radius:50%;background:var(--r);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ads-step-title{font-size:13px;font-weight:700;color:var(--color-text-primary);flex:1}
.ads-step-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap}
.ads-step-body{display:none;padding:.6rem .9rem;border-top:0.5px solid var(--color-border-tertiary);background:var(--gray1)}
.ads-step.open .ads-step-body{display:block}
.ads-row{display:flex;gap:.5rem;margin-bottom:.4rem;align-items:flex-start;font-size:12px;line-height:1.4;color:var(--color-text-primary)}
.ads-row-label{font-weight:700;color:var(--r);min-width:90px;flex-shrink:0}
.seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;margin-top:.4rem}
.seg-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:.45rem .55rem}
.seg-name{font-size:10px;font-weight:700;color:var(--color-text-primary);margin-bottom:.15rem}
.seg-val{font-size:11px;color:var(--color-text-secondary);line-height:1.4}

.budget-vis{display:flex;gap:.3rem;height:60px;align-items:flex-end;margin:.5rem 0}
.bv-bar{flex:1;border-radius:4px 4px 0 0;background:var(--r);position:relative;display:flex;align-items:center;justify-content:center}
.bv-label{font-size:8px;font-weight:700;color:#fff;writing-mode:horizontal-tb}
.bv-week{font-size:9px;font-weight:700;color:var(--gray3);text-align:center;margin-top:3px}

.progress-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:1rem}
.ps-card{background:var(--color-background-secondary);border-radius:8px;padding:.6rem;text-align:center}
.ps-num{font-size:20px;font-weight:700;color:var(--r)}
.ps-label{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
</style>

var TASK_STATE = {};
var SELECTED_KEY = null;

function getTagsForDay(key){
  if(!CAL_TASKS[key]) return [];
  var types = {};
  CAL_TASKS[key].tasks.forEach(function(t){types[t.type]=1});
  return Object.keys(types);
}

function buildCal(){
  var grid = document.getElementById("cal-grid");
  var emptyStart = 0; // March 23 = Sunday(0)
  for(var i=0;i<emptyStart;i++){
    var e=document.createElement("div");e.className="cal-day empty";grid.appendChild(e);
  }
  DAYS_CONFIG.forEach(function(dc){
    var div=document.createElement("div");
    div.className="cal-day"+(dc.event?" event-day":"");
    div.setAttribute("data-key",dc.key);
    var allDone = TASK_STATE[dc.key] && CAL_TASKS[dc.key] &&
      TASK_STATE[dc.key].filter(Boolean).length === CAL_TASKS[dc.key].tasks.length;
    if(allDone) div.classList.add("checked");
    var tags=getTagsForDay(dc.key);
    var tagsHtml = tags.map(function(tp){
      return '<span class="ct ct-'+tp+'">'+{r:"Reels",y:"Feed",b:"Ads",g:"Config",p:"Live"}[tp]+'</span>';
    }).join("");
    div.innerHTML='<div class="cal-dn">'+dc.d+' '+dc.m+'</div><div class="cal-tags">'+tagsHtml+'</div>';
    div.onclick=function(){openDay(dc.key,dc.label,dc.phase||"");};
    grid.appendChild(div);
  });
}

function openDay(key,label,phase){
  SELECTED_KEY=key;
  var det=document.getElementById("day-detail");
  det.classList.add("on");
  document.getElementById("dd-title").textContent=label;
  var phaseMap={"23/03":"PRÉ-LANÇAMENTO","24/03":"PRÉ-LANÇAMENTO","25/03":"ABERTURA","23/04":"ENCERRAMENTO"};
  var ph = phaseMap[key] || (CAL_TASKS[key]?CAL_TASKS[key].phase:"DIA");
  document.getElementById("dd-phase").textContent=ph;
  var list=document.getElementById("task-list");
  list.innerHTML="";
  if(!CAL_TASKS[key]){
    list.innerHTML='<div style="font-size:12px;color:var(--color-text-secondary);padding:.3rem 0">Dia de descanso ou repostagem orgânica. Monitore comentários e DMs.</div>';
    document.getElementById("day-prog").style.width="100%";
    document.getElementById("day-prog-txt").textContent="100%";
    return;
  }
  if(!TASK_STATE[key]) TASK_STATE[key]=[];
  CAL_TASKS[key].tasks.forEach(function(task,i){
    if(TASK_STATE[key][i]===undefined) TASK_STATE[key][i]=false;
    var row=document.createElement("div");
    row.className="task"+(TASK_STATE[key][i]?" done":"");
    var typeColors={r:"ct-r",y:"ct-y",b:"ct-b",g:"ct-g",p:"ct-p"};
    var typeNames={r:"Reels/Story",y:"Feed",b:"Ads",g:"Config",p:"Live"};
    row.innerHTML='<div class="chk'+(TASK_STATE[key][i]?" on":"")+'">'+
      (TASK_STATE[key][i]?"✓":"")+'</div>'+
      '<div class="task-text">'+task.t+'</div>'+
      '<span class="cpill '+typeColors[task.type]+' task-type">'+typeNames[task.type]+'</span>';
    row.onclick=function(){toggleTask(key,i,row)};
    list.appendChild(row);
  });
  updateDayProg(key);
}

function toggleTask(key,i,row){
  TASK_STATE[key][i]=!TASK_STATE[key][i];
  row.classList.toggle("done",TASK_STATE[key][i]);
  var chk=row.querySelector(".chk");
  chk.classList.toggle("on",TASK_STATE[key][i]);
  chk.textContent=TASK_STATE[key][i]?"✓":"";
  updateDayProg(key);
  updateTotals();
  var dc = DAYS_CONFIG.find(function(d){return d.key===key});
  var calDay = document.querySelector('[data-key="'+key+'"]');
  if(calDay){
    var allDone=TASK_STATE[key].filter(Boolean).length===CAL_TASKS[key].tasks.length;
    calDay.classList.toggle("checked",allDone);
  }
}

function updateDayProg(key){
  if(!CAL_TASKS[key]) return;
  var total=CAL_TASKS[key].tasks.length;
  var done=(TASK_STATE[key]||[]).filter(Boolean).length;
  var pct=Math.round(done/total*100);
  document.getElementById("day-prog").style.width=pct+"%";
  document.getElementById("day-prog-txt").textContent=pct+"%";
}

function updateTotals(){
  var total=0,done=0;
  Object.keys(CAL_TASKS).forEach(function(key){
    total+=CAL_TASKS[key].tasks.length;
    done+=(TASK_STATE[key]||[]).filter(Boolean).length;
  });
  document.getElementById("cnt-total").textContent=total;
  document.getElementById("cnt-done").textContent=done;
  document.getElementById("cnt-pct").textContent=Math.round(done/total*100)+"%";
}

function buildProd(){
  var grid=document.getElementById("prod-grid");
  PRODUTOS.forEach(function(p,i){
    var card=document.createElement("div");
    card.className="prod-card";
    var copiesHtml=p.copies.map(function(c){
      return '<div class="copy-block"><div class="copy-label">'+c.label+'</div>'+
        '<div class="copy-text"><strong>'+c.head+'</strong><br>'+c.body+'</div>'+
        '</div>';
    }).join("");
    var pillsHtml=p.pills.map(function(pl){
      return '<span class="cpill ct-b cpill">'+pl+'</span>';
    }).join("");
    card.innerHTML='<div class="prod-top">'+
      '<div class="prod-num">'+p.num+'</div>'+
      '<div class="prod-name">'+p.name+'</div>'+
      '<div class="prod-tag">'+p.tag+'</div>'+

        '<div class="prod-desc">'+p.desc+'</div>'+
        copiesHtml+
        '<div class="content-pills">'+pillsHtml+'</div>'+
      '</div>';

      var isOpen=card.classList.contains("open");
      document.querySelectorAll(".prod-card").forEach(function(c){c.classList.remove("open")});

function buildAds(){
  var cont=document.getElementById("ads-container");
  ADS_STEPS.forEach(function(step){
    var div=document.createElement("div");div.className="ads-step";
    var rowsHtml=step.rows.map(function(r){
      return '<div class="ads-row"><div class="ads-row-label">'+r.label+'</div><div>'+r.val+'</div></div>';
    }).join("");
    div.innerHTML='<div class="ads-step-head" onclick="this.parentElement.classList.toggle(\'open\')">'+
      '<div class="ads-step-num">'+step.num+'</div>'+
      '<div class="ads-step-title">'+step.title+'</div>'+
      '<div class="ads-step-badge" style="background:'+step.badgeColor+';color:'+(step.badgeColor==='#fbba00'?'#111':'#fff')+'">'+step.badge+'</div>'+
      '</div>'+
      '<div class="ads-step-body">'+rowsHtml+'</div>';
    cont.appendChild(div);
  });
}

function goTab(id){
  document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("on")});
  document.querySelectorAll(".ntab").forEach(function(t){t.classList.remove("on")});
  document.getElementById("pg-"+id).classList.add("on");
  event.target.classList.add("on");
}

buildCal();
buildProd();
buildCopies();
buildAds();
updateTotals();
</script>
